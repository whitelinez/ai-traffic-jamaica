<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHITELINEZ — Temporarily Offline</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080C14;
      --surface: #0d1117;
      --border:  rgba(255,255,255,0.07);
      --accent:  #FFB800;
      --text:    #e0e8f0;
      --muted:   rgba(160,190,215,0.55);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Archivo", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,184,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,184,0,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      max-width: 480px;
      width: 100%;
    }

    /* ── Logo ── */
    .logo-wrap {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Status badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,184,0,0.08);
      border: 1px solid rgba(255,184,0,0.2);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Main copy ── */
    h1 {
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--text);
    }
    h1 span { color: var(--accent); }

    p {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.65;
      max-width: 360px;
    }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      opacity: 0.35;
      border-radius: 2px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(160,190,215,0.3);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-wrap">
      <img src="/img/iconinframes.png" alt="Whitelinez" />
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      Maintenance Mode
    </div>

    <div>
      <h1>We'll be back<br /><span>shortly.</span></h1>
    </div>

    <div class="divider"></div>

    <p>
      WHITELINEZ is temporarily offline for scheduled maintenance.
      We're working to restore service as quickly as possible.
    </p>

    <div class="footer">WHITELINEZ &nbsp;·&nbsp; AI Traffic Intelligence</div>
  </div>
</body>
</html>
